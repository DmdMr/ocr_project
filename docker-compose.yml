version: '3.8'

services:

  mongodb:
    image: mongo:7
    container_name: mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  backend:
    build: ./backend
    container_name: fastapi_backend
    ports:
      - "8000:8000"
    volumes:
      - ${UPLOAD_DIR_HOST:-./data/uploads}:${UPLOAD_DIR_CONTAINER:-/srv/ocr_uploads}
    depends_on:
      - mongodb
    environment:
      - ENVIRONMENT=${ENVIRONMENT:-production}
      - MONGO_URL=${MONGO_URL:-mongodb://mongodb:27017}
      - MONGO_DB_NAME=${MONGO_DB_NAME:-ocr_database}
      - UPLOAD_DIR=${UPLOAD_DIR_CONTAINER:-/srv/ocr_uploads}
      - SECRET_KEY=${SECRET_KEY}
      - FRONTEND_ORIGIN=${FRONTEND_ORIGIN:-http://localhost:5173}

  frontend:
    build: ./frontend
    container_name: svelte_frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  mongo-data:

